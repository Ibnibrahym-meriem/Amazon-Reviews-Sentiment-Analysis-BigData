version: '3.8'

# ════════════════════════════════════════════════════════════════════════
# docker-compose.yml — VERSION FINALE avec MLflow
# Basé sur l'architecture  + ajout MLflow + volumes modèles
# ════════════════════════════════════════════════════════════════════════

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # pymongo  → DAG monitoring (déjà présent)
    # pyspark  → DAG réentraînement (Task 2 et 3)
    # mlflow   → tracking des expériences
    _PIP_ADDITIONAL_REQUIREMENTS: 'pymongo pyspark==3.5.1 mlflow==2.11.0'
    JAVA_HOME: '/usr/lib/jvm/java-17-openjdk-amd64'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # AJOUT — modèles ML partagés entre Airflow et Spark local
    - ./models:/opt/models
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ──────────────────────────────────────────────────────────────────────
  # ZOOKEEPER 
  # ──────────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # KAFKA 
  # ──────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # KAFKA UI 
  # ──────────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # MONGODB 
  # ──────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # MONGO EXPRESS 
  # ──────────────────────────────────────────────────────────────────────
  mongo-express:
    image: mongo-express
    container_name: mongo_express
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # PRODUCER (service Docker permanent)
  # ──────────────────────────────────────────────────────────────────────
  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: kafka_producer
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # SPARK STREAMING (service Docker permanent)
  # ──────────────────────────────────────────────────────────────────────
  spark-streaming:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark_streaming
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_started
    volumes:
      - ./checkpoint_final:/app/checkpoint_final
      # Accès aux modèles pour le streaming
      - ./models:/opt/models
    ports:
      - "4040:4040"
    environment:
      SPARK_LOCAL_IP: "0.0.0.0"
      SPARK_UI_PORT: "4040"
      JAVA_TOOL_OPTIONS: >-
        --add-opens=java.base/javax.security.auth=ALL-UNNAMED
        --add-opens=java.base/java.lang=ALL-UNNAMED
        --add-opens=java.base/java.net=ALL-UNNAMED
        --add-opens=java.base/java.util=ALL-UNNAMED
        --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
        --add-opens=java.base/java.text=ALL-UNNAMED
        --add-opens=java.sql/java.sql=ALL-UNNAMED
    networks:
      - amazon_network

  # ══════════════════════════════════════════════════════════════════════
  # MLFLOW — NOUVEAU SERVICE DOCKER POUR LE TRACKING DES EXPÉRIENCES
  # UI : http://localhost:5000
  # Stockage : SQLite dans le volume mlflow-data (persistant)
  # ══════════════════════════════════════════════════════════════════════
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - amazon_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────
  # POSTGRESQL — Backend Airflow 
  # ──────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # AIRFLOW INIT — initialise la BDD et crée l'utilisateur admin (s'exécute une seule fois)
  # ──────────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@admin.com
      "
    restart: "no"
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # AIRFLOW WEBSERVER 
  # ──────────────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - amazon_network

  # ──────────────────────────────────────────────────────────────────────
  # AIRFLOW SCHEDULER (exécute les DAGs automatiquement)
  # ──────────────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - amazon_network

# ════════════════════════════════════════════════════════════════════════
# VOLUMES
# ════════════════════════════════════════════════════════════════════════
volumes:
  mongo-data: {}
  postgres-data: {}
  mlflow-data: {}       

# ════════════════════════════════════════════════════════════════════════
# NETWORK — tous les services communiquent par nom de service
# ════════════════════════════════════════════════════════════════════════
networks:
  amazon_network:
    driver: bridge
